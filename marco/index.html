<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marco — Supply Chain Intelligence Partner</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d1520;--bg2:#131d2d;--bg3:#1a2638;--bg4:#223248;
--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.14);
--gold:#FFDF80;--gold2:#FFE9A8;--goldDim:rgba(255,223,128,0.06);
--grn:#6FFFB0;--grnd:rgba(111,255,176,0.14);
--red:#FF8FA0;--redd:rgba(255,143,160,0.14);
--org:#FFB898;--orgd:rgba(255,184,152,0.14);
--blu:#B0CCFF;--blud:rgba(176,204,255,0.14);
--t1:#FFFFFF;--t2:#D4DCE8;--t3:#99A8BE;--t4:#667890;
--sidebar:200px;--topbar:3px
}
html{font-size:16px;-webkit-font-smoothing:antialiased;background:var(--bg)}
body{background:var(--bg);color:var(--t2);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* ===== TOPBAR ===== */
.topbar{height:var(--topbar);background:linear-gradient(90deg,var(--gold),var(--gold2),var(--gold));position:fixed;top:0;left:0;right:0;z-index:1000}

/* ===== HEADER ===== */
.hdr{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0.5rem 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:var(--topbar);z-index:100}
.hdr-left{display:flex;align-items:center;gap:0.65rem}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;color:var(--bg);letter-spacing:-0.5px}
.brand-name{font-size:0.9rem;font-weight:700;color:var(--t1);letter-spacing:1.5px}
.brand-sub{font-size:0.45rem;color:var(--gold);font-weight:600;letter-spacing:3px;text-transform:uppercase}
.bc{font-size:0.65rem;color:var(--t3);display:flex;align-items:center;gap:0.35rem;margin-left:0.5rem}
.bc span{color:var(--gold);font-weight:600}
.bc-sep{color:var(--t4);font-size:0.5rem}
.hdr-right{display:flex;align-items:center;gap:0.75rem}
.live{font-size:0.55rem;color:var(--grn);font-weight:500;display:flex;align-items:center;gap:0.25rem}
.dot{width:5px;height:5px;background:var(--grn);border-radius:50%;box-shadow:0 0 6px rgba(111,255,176,0.4);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hdr-time{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--t3)}
.user-badge{font-size:0.55rem;color:var(--t2);background:var(--bg3);padding:0.18rem 0.5rem;border-radius:3px;border:1px solid var(--bdr);cursor:pointer}

/* ===== LAYOUT ===== */
.app{display:flex;flex:1;margin-top:calc(var(--topbar) + 40px)}
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--bdr);position:fixed;top:calc(var(--topbar) + 40px);bottom:0;overflow-y:auto;z-index:50;padding:0.5rem 0}
.main{margin-left:var(--sidebar);flex:1;min-height:calc(100vh - 40px - var(--topbar));display:flex;flex-direction:column}

/* ===== SIDEBAR ===== */
.s-section{font-size:0.42rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--t4);padding:0.6rem 0.75rem 0.25rem}
.s-domain{display:flex;align-items:center;gap:0.5rem;padding:0.4rem 0.75rem;font-size:0.7rem;font-weight:600;color:var(--t3);cursor:pointer;border-left:2px solid transparent;transition:all 0.12s}
.s-domain:hover{color:var(--t1);background:rgba(255,255,255,0.02)}
.s-domain.active{color:var(--gold);border-left-color:var(--gold);background:var(--goldDim)}
.s-domain-icon{font-size:0.55rem;width:14px;text-align:center;opacity:0.6}
.s-domain.active .s-domain-icon{opacity:1}
.s-terms{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.s-terms.open{max-height:300px}
.s-term{display:block;padding:0.28rem 0.75rem 0.28rem 2rem;font-size:0.62rem;color:var(--t4);cursor:pointer;border-left:2px solid transparent;transition:all 0.1s}
.s-term:hover{color:var(--t1);background:rgba(255,255,255,0.02)}
.s-term.active{color:var(--gold);border-left-color:rgba(255,223,128,0.3)}
.s-term::before{content:'';display:inline-block;width:3px;height:3px;background:var(--t4);border-radius:50%;margin-right:0.4rem;vertical-align:middle}
.s-term.active::before{background:var(--gold)}
.s-live{font-size:0.4rem;font-weight:700;padding:1px 4px;border-radius:2px;margin-left:auto;letter-spacing:0.5px;text-transform:uppercase}
.s-live-on{background:rgba(111,255,176,0.12);color:var(--grn)}
.s-live-plan{background:rgba(176,204,255,0.08);color:var(--blu)}

/* ===== TERMINAL HERO ===== */
.hero{background:var(--bg2);padding:1rem 1.25rem 0;border-bottom:1px solid var(--bdr)}
.hero-domain{font-size:0.45rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:0.2rem;display:flex;align-items:center;gap:0.35rem}
.hero-domain::before{content:'';width:12px;height:1px;background:var(--gold)}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:var(--t1);line-height:1.15;margin-bottom:0.15rem}
.hero-desc{font-size:0.72rem;color:var(--t2);line-height:1.45;max-width:700px}
.hero-metrics{display:flex;gap:1.5rem;margin-top:0.55rem;padding-bottom:0.7rem;flex-wrap:wrap}
.hm-val{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--gold)}
.hm-lbl{font-size:0.5rem;color:var(--t2);text-transform:uppercase;letter-spacing:1px}

/* ===== TABS ===== */
.tabs{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:0 1.25rem;display:flex;gap:0;position:sticky;top:calc(var(--topbar) + 40px);z-index:40;overflow-x:auto}
.tab{padding:0.5rem 0.85rem;font-size:0.68rem;font-weight:600;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--t1);background:rgba(255,255,255,0.02)}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);background:rgba(255,223,128,0.06);font-weight:700}
.tab-count{font-family:'JetBrains Mono',monospace;font-size:0.45rem;background:rgba(255,255,255,0.06);padding:0.08rem 0.3rem;border-radius:3px;margin-left:0.3rem;color:var(--t3)}
.tab.active .tab-count{background:rgba(255,223,128,0.18);color:var(--gold)}

/* ===== CONTENT ===== */
.tab-content{display:none;padding:1rem 1.25rem;flex:1;background:var(--bg)}
.tab-content.active{display:block}
.pnl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;padding-bottom:0.3rem;border-bottom:1px solid var(--bdr)}
.pnl-title{font-size:0.52rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold)}
.pnl-badge{font-family:'JetBrains Mono',monospace;font-size:0.45rem;color:var(--t3);background:rgba(255,255,255,0.05);padding:0.1rem 0.35rem;border-radius:3px;border:1px solid var(--bdr)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:0.85rem}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.src{font-family:'JetBrains Mono',monospace;font-size:0.48rem;color:var(--t4);opacity:0.7;margin-top:0.4rem}

/* ===== RISK SCORECARD ===== */
.risk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-bottom:0.65rem}
@media(max-width:700px){.risk-grid{grid-template-columns:1fr 1fr}}
.risk-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;padding:0.5rem;text-align:center}
.risk-val{font-family:'JetBrains Mono',monospace;font-size:1.05rem;font-weight:700;line-height:1}
.risk-lbl{font-size:0.52rem;color:var(--t2);margin-top:0.1rem;line-height:1.25}

/* ===== DRIVER BARS ===== */
.driver{display:flex;align-items:center;gap:0.45rem;padding:0.35rem 0;border-bottom:1px solid rgba(255,255,255,0.025)}
.driver-name{font-size:0.72rem;color:var(--t1);font-weight:600;width:130px;flex-shrink:0}
.driver-bar-bg{flex:1;height:22px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.driver-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:0.35rem;font-family:'JetBrains Mono',monospace;font-size:0.52rem;font-weight:600;color:var(--bg)}
.driver-pct{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--t1);width:32px;text-align:right;flex-shrink:0;font-weight:600}
.driver-trend{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:700;width:55px;text-align:right;flex-shrink:0}
.up{color:var(--red)}.dn{color:var(--grn)}.flat{color:var(--t3)}
.db-1{background:linear-gradient(90deg,#FF8FA0,#ffb0bc)}
.db-2{background:linear-gradient(90deg,#FFDF80,#FFE9A8)}
.db-3{background:linear-gradient(90deg,#FFB898,#ffd0b8)}
.db-4{background:linear-gradient(90deg,#6FFFB0,#99ffc8)}
.db-5{background:linear-gradient(90deg,#B0CCFF,#c8daff)}
.db-6{background:linear-gradient(90deg,#99A8BE,#b0bccf)}

/* ===== PROVIDER TABLE ===== */
.tbl-row{display:grid;padding:0.4rem 0.15rem;border-bottom:1px solid rgba(255,255,255,0.03);font-size:0.68rem;align-items:center}
.tbl-row:hover{background:var(--bg4)}
.tbl-row.hdr{color:var(--t3);font-size:0.48rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--bdr2)}
.tbl-row.hdr:hover{background:transparent}
.c-name{color:var(--t1);font-weight:600}
.badge-sm{font-size:0.52rem;font-weight:700;padding:0.1rem 0.35rem;border-radius:3px;display:inline-block;text-align:center}
.b-strong{background:rgba(111,255,176,0.15);color:var(--grn);border:1px solid rgba(111,255,176,0.25)}
.b-watch{background:rgba(255,223,128,0.15);color:var(--gold);border:1px solid rgba(255,223,128,0.25)}
.b-risk{background:rgba(255,143,160,0.15);color:var(--red);border:1px solid rgba(255,143,160,0.25)}

/* ===== OWNERSHIP TREE ===== */
.tree-parent{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:0.5rem 0.65rem;margin-bottom:0.5rem}
.tree-p-name{font-size:0.72rem;color:var(--t1);font-weight:600;display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap}
.tree-p-tag{font-size:0.42rem;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(255,223,128,0.1);padding:0.06rem 0.22rem;border-radius:2px}
.tree-subs{padding-left:1.1rem;border-left:2px solid rgba(255,223,128,0.18);margin-left:0.55rem;margin-top:0.25rem}
.tree-sub{padding:0.2rem 0 0.2rem 0.55rem;border-bottom:1px solid rgba(255,255,255,0.02);position:relative}
.tree-sub::before{content:'';position:absolute;left:-1.1rem;top:50%;width:1.1rem;border-top:1px dashed rgba(255,223,128,0.18)}
.tree-sub-name{font-size:0.7rem;color:var(--t1);font-weight:600}
.tree-sub-detail{font-size:0.58rem;color:var(--t2)}

/* ===== ALERTS ===== */
.alert{border-radius:5px;padding:0.5rem 0.65rem;margin-bottom:0.4rem}
.alert-red{background:var(--redd);border:1px solid rgba(255,143,160,0.25);border-left:3px solid var(--red)}
.alert-gold{background:var(--goldDim);border:1px solid rgba(255,223,128,0.18);border-left:3px solid var(--gold)}
.alert-grn{background:var(--grnd);border:1px solid rgba(111,255,176,0.18);border-left:3px solid var(--grn)}
.alert-blu{background:var(--blud);border:1px solid rgba(176,204,255,0.18);border-left:3px solid var(--blu)}
.alert-title{font-size:0.5rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:0.12rem}
.alert-text{font-size:0.7rem;color:var(--t1);line-height:1.45}

/* ===== ACTIONS ===== */
.act{background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid var(--gold);border-radius:0 5px 5px 0;padding:0.5rem 0.65rem;margin-bottom:0.4rem}
.act-pri{font-size:0.45rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:0.12rem}
.act-text{font-size:0.7rem;color:var(--t1);line-height:1.45}
.act-cat{font-size:0.48rem;color:var(--t3);margin-top:0.15rem;font-family:'JetBrains Mono',monospace}
.pri-urg{color:var(--red)}.pri-act{color:var(--gold)}.pri-str{color:var(--blu)}.pri-mon{color:var(--grn)}

/* ===== FOOTER ===== */
.ftr{background:var(--bg2);padding:0.35rem 1.25rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--bdr);font-size:0.42rem;color:var(--t4);margin-top:auto}
.ftr a{color:var(--gold);text-decoration:none}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.sidebar{display:none}
.main{margin-left:0}
.hero-metrics{gap:0.75rem}
}
@media print{
body{background:#fff;color:#333}
.topbar,.hdr,.sidebar,.ftr,.tabs{display:none!important}
.main{margin-left:0}
.tab-content{display:block!important}
:root{--bg:#fff;--bg2:#fff;--bg3:#f5f5f5;--bg4:#eee;--bdr:rgba(0,0,0,0.1);--gold:#B08830;--t1:#111;--t2:#444;--t3:#888}
}
/* ===== MAPPER ===== */
.chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:0.35rem;margin-bottom:0.6rem}
.chip{background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;padding:0.35rem 0.5rem;font-size:0.68rem;color:var(--t2);cursor:pointer;transition:all 0.12s;text-align:center;user-select:none}
.chip:hover{border-color:rgba(255,223,128,0.3);color:var(--t1)}.chip.active{border-color:var(--gold);color:var(--gold);background:rgba(255,223,128,0.06)}
.sel-chips{display:flex;flex-wrap:wrap;gap:0.25rem;min-height:24px;margin-top:0.4rem}
.sel-chip{background:rgba(255,223,128,0.08);border:1px solid rgba(255,223,128,0.25);border-radius:3px;padding:0.2rem 0.4rem;font-size:0.62rem;color:var(--gold);display:flex;align-items:center;gap:0.25rem}
.sel-chip .x{cursor:pointer;font-weight:700;opacity:0.6;font-size:0.75rem}.sel-chip .x:hover{opacity:1}
.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.5rem;margin-bottom:0.6rem}
.score-card{background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;padding:0.6rem;text-align:center}
.score-val{font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:700;line-height:1}
.score-lbl{font-size:0.52rem;color:var(--t2);margin-top:0.1rem;line-height:1.2}
.map-group{background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:0.6rem 0.7rem;margin-bottom:0.5rem}
.map-parent{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem}
.map-parent-name{font-size:0.78rem;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap}
.map-parent-tag{font-size:0.45rem;color:var(--gold);font-weight:700;letter-spacing:1px;text-transform:uppercase;background:rgba(255,223,128,0.12);padding:0.06rem 0.25rem;border-radius:2px}
.map-count{font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:700;padding:0.12rem 0.4rem;border-radius:3px}
.count-risk{background:rgba(255,143,160,0.2);color:#FF8FA0;border:1px solid rgba(255,143,160,0.3)}
.map-subs{padding-left:1.1rem;border-left:2px solid rgba(255,223,128,0.2);margin-left:0.5rem;margin-top:0.25rem}
.map-sub{padding:0.2rem 0 0.2rem 0.6rem;font-size:0.7rem;color:var(--t1);font-weight:500;position:relative;border-bottom:1px solid rgba(255,255,255,0.02)}
.map-sub::before{content:'';position:absolute;left:-1.1rem;top:50%;width:1.1rem;border-top:1px dashed rgba(255,223,128,0.2)}
.map-ind{background:var(--bg3);border:1px solid var(--bdr);border-left:3px solid #6FFFB0;border-radius:0 5px 5px 0;padding:0.4rem 0.6rem;margin-bottom:0.3rem;display:flex;justify-content:space-between;align-items:center}
.map-ind-name{font-size:0.72rem;font-weight:500;color:var(--t1)}.map-ind-status{font-size:0.55rem;color:#6FFFB0;font-weight:600}
.custom-row{display:flex;gap:0.35rem;margin-top:0.4rem}
.custom-row input{flex:1;background:var(--bg3);border:1px solid var(--bdr);border-radius:4px;padding:0.4rem 0.6rem;font-size:0.7rem;color:var(--t1);font-family:'DM Sans',sans-serif;outline:none}
.custom-row input:focus{border-color:rgba(255,223,128,0.4)}
.custom-row input::placeholder{color:var(--t3)}
.add-btn{padding:0.4rem 0.7rem;font-size:0.65rem;font-weight:600;background:var(--bg4);border:1px solid var(--bdr);border-radius:4px;color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.add-btn:hover{color:var(--t1);border-color:rgba(255,255,255,0.2)}
</style>
</head>
<body>

<div class="topbar"></div>

<!-- ===== HEADER ===== -->
<div class="hdr">
<div class="hdr-left">
  <div class="logo">M</div>
  <div><div class="brand-name">MARCO</div><div class="brand-sub">Supply Chain Intelligence</div></div>
  <div class="bc"><span class="bc-sep">▸</span> <span id="bc-domain">Sourcing Intelligence</span> <span class="bc-sep">▸</span> <span id="bc-term">Category Landscape</span></div>
</div>
<div class="hdr-right">
  <div class="live"><div class="dot"></div> LIVE</div>
  <div class="hdr-time" id="clk"></div>
  <div class="user-badge" id="user-name">Demo Client</div>
</div>
</div>

<!-- ===== LAYOUT ===== -->
<div class="app">

<!-- ===== SIDEBAR ===== -->
<div class="sidebar" id="sidebar"></div>

<!-- ===== MAIN ===== -->
<div class="main">
  <div class="hero" id="hero"></div>
  <div class="tabs" id="tab-bar"></div>
  <div id="tab-panels"></div>
  <div class="ftr"><span>Marco v1.0 · Supply Chain Intelligence · Data: EIA, FRED, EDGAR, USTR, BLS, ITC, EPA, FERC</span><span><a href="https://foleystrategicadvisory.com">foleystrategicadvisory.com</a> · Foley Strategic Advisory © 2026</span></div>
</div>
</div>

<script>
// ===== CLOCK =====
function uc(){var n=new Date();document.getElementById('clk').textContent=n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZoneName:'short'})}
setInterval(uc,1000);uc();

// =====================================================================
// MARCO UNIVERSAL TERMINAL DATA MODEL
// Each terminal is a single object that the template renders.
// To add a new terminal in ANY domain, define the data. The UI builds itself.
// =====================================================================

var DOMAINS = [
  {id:'sourcing', name:'Sourcing Intelligence', icon:'◆', status:'live',
   terminals:[
     {id:'cat-landscape', name:'Category Landscape', status:'live'},
     {id:'bearings', name:'Bearings & Power Trans.', status:'live'},
     {id:'welding', name:'Welding & Industrial Gases', status:'live'},
     {id:'water', name:'Water & Wastewater', status:'live'},
     {id:'compressed-air', name:'Compressed Air', status:'live'},
     {id:'calibration', name:'Calibration Services', status:'live'},
     {id:'capex', name:'Capital Equipment', status:'live'},
     {id:'concrete', name:'Concrete & Construction', status:'live'},
     {id:'fleet-fuel', name:'Fleet & Fuel', status:'live'},
     {id:'insulation', name:'Insulation & Thermal', status:'live'},
     {id:'it-telecom', name:'IT & Telecom', status:'live'},
     {id:'janitorial', name:'Janitorial & Sanitation', status:'live'},
     {id:'plastics-rubber', name:'Plastics & Rubber', status:'live'},
     {id:'print-office', name:'Print & Office', status:'live'},
     {id:'professional-services', name:'Professional Services', status:'live'},
     {id:'staffing', name:'Staffing & Temp Labor', status:'live'},
     {id:'uniforms', name:'Uniforms & PPE', status:'live'},
     {id:'supplier-network', name:'Supplier Network Mapper', status:'live'},
     {id:'contract-intel', name:'Contract Intelligence', status:'planned'},
     {id:'should-cost', name:'Should-Cost Modeling', status:'planned'}
   ]},
  {id:'movement', name:'Movement Intelligence', icon:'◆', status:'planned',
   terminals:[
     {id:'freight-rates', name:'Freight Rate Monitor', status:'planned'},
     {id:'carrier-score', name:'Carrier Scorecard', status:'planned'},
     {id:'lane-analysis', name:'Lane Analysis', status:'planned'},
     {id:'disruption', name:'Disruption Watch', status:'planned'}
   ]},

  risks: [
    {type:'red', title:'Most Expensive Utility Per Unit of Energy', text:'Compressed air costs $0.18-0.30 per 1,000 cubic feet — primarily electricity. Only 10-15% of electrical energy becomes useful compressed air; the rest is heat. A 100 HP compressor running 8,000 hours/year costs $50,000-70,000 in electricity alone. Yet most plants don\'t meter compressed air, don\'t track cost per CFM, and don\'t manage it as a utility.'},
    {type:'blu', title:'The Procurement Opportunity', text:'A typical mid-size plant spends $200K-800K/year on compressed air (electricity + maintenance + equipment). Most can reduce by 20-35% through three actions: fix leaks (10-15% savings), add VFD control (10-20%), and reduce pressure (2% per 1 PSI drop). On $500K annual cost, that is $100K-175K/year — without buying from a new supplier.'},
    {type:'red', title:'Purchase Price Is Almost Irrelevant', text:'Over 10 years: 70% is electricity, 10% is equipment, 20% is maintenance. A $50K compressor consumes $350K-500K in electricity over its life. A cheaper compressor that is 5% less efficient costs $17K-25K more in energy over 10 years. Always buy on specific power (kW/100 CFM), not sticker price.'},
    {type:'gold', title:'Specific Power = kW per 100 CFM', text:'This is the ONLY metric for comparing compressors. 18 kW/100 CFM is 10% more efficient than 20 kW/100 CFM. Over 10 years at 8,000 hrs/yr and $0.10/kWh, that 2 kW difference on a 500 CFM compressor costs $80,000 in electricity. CAGI publishes verified performance sheets for all major models — use them. Free at cagi.org.'},
    {type:'gold', title:'Air as a Service (CaaS)', text:'Atlas Copco, Kaeser, and independents offer compressed air as a service — they own the compressor, maintain it, charge you per CFM delivered. Converts CAPEX to OPEX, transfers maintenance to OEM, aligns incentives (they want efficiency because they pay the electric bill). Worth evaluating for new installations or aging equipment replacements.'},
    {type:'red', title:'⚠ Atlas Copco / Quincy / Chicago Pneumatic', text:'Atlas Copco owns Quincy AND Chicago Pneumatic. If you buy Atlas Copco rotary screws, Quincy reciprocating, and CP air tools — one company. Also owns Pneumatech (dryers/filters) and Edwards (vacuum). Check your entire compressed gas/vacuum spend.'},
    {type:'gold', title:'⚠ Ingersoll Rand / Gardner Denver Merger', text:'IR merged with Gardner Denver in 2020. If you buy IR rotary screws and Gardner Denver reciprocating compressors — same company. Includes CompAir, Nash, Elmo Rietschle. Market went from 4 major players to effectively 3 (Atlas Copco, IR/Gardner Denver, Sullair/Hitachi).'},
    {type:'red', title:'You Are Paying to Compress Air That Leaks Into the Ceiling', text:'DOE estimates 25-30% of compressed air in a typical plant is lost through leaks. On a 1,000 CFM system, that is 250-300 CFM you pay to produce and never use. At $0.25/1,000 CFM, a 1,000 CFM system with 25% leaks wastes $4,000-6,000/month in electricity. Leaks are in fittings, quick-connects, hoses, drain valves, pipe joints. You cannot hear most over plant noise — you need an ultrasonic detector.'},
    {type:'gold', title:'85-90% of Compressor Energy Becomes Heat', text:'A 100 HP compressor rejects ~210,000 BTU/hr — enough to heat a 5,000 sq ft building. Heat recovery systems cost $5K-15K and pay back in 1-2 heating seasons in cold climates. Atlas Copco and Kaeser both offer integrated options.'},
    {type:'blu', title:'Free DOE & Utility Resources', text:'DOE Compressed Air Challenge: Free training for plant engineers. DOE Industrial Assessment Centers: Free energy audits for qualifying mid-size manufacturers (under 500 employees, under $100M revenue). Utility rebates: Most utilities offer $50-200/HP for VFD compressors and leak repair programs.'},
    {type:'gold', title:'Low Tariff Category', text:'Major OEMs (Atlas Copco/Sweden, Kaeser/Germany, IR/US, Sullair/Hitachi with US manufacturing) produce outside China or domestically. Chinese compressors face 25% Section 301 but have minimal market share in industrial applications above 25 HP. The cost driver is electricity, not trade policy.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — HIGHEST ROI IN THE PLANT', priClass:'pri-urg', text:'Schedule an ultrasonic leak survey. Buy a Fluke ii900 ($5K) or hire an auditor ($2K-4K). Tag every leak, fix in priority order. Recover 10-15% of compressed air cost immediately. Payback: days. Repeat quarterly.', tags:'LEAK DETECTION · ENERGY · IMMEDIATE ROI'},
    {pri:'URGENT — FREE SAVINGS', priClass:'pri-urg', text:'Measure system pressure. If running 110+ PSI and highest application needs 90 PSI, reduce in 2 PSI increments. Each 2 PSI saves ~1%. Also reduces leak rate. Costs nothing. Do it this afternoon.', tags:'PRESSURE · REDUCTION · FREE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'If compressors are fixed-speed and demand fluctuates, get VFD quotes. Atlas Copco GA VSD+, Kaeser SFC, IR R-Series VSD. Savings: 15-35%. Check utility rebates first — many cover 30-50% of VFD cost ($50-200/HP).', tags:'VFD · ENERGY · UTILITY REBATE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Benchmark OEM maintenance contract against independent providers. OEM contracts 25-40% above independent pricing. Third-party filters, oil, separators available at 30-50% savings for all major brands.', tags:'MAINTENANCE · INDEPENDENT · SAVINGS'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Apply for DOE Industrial Assessment Center audit if you qualify. Free. University teams audit compressed air, HVAC, lighting, process energy. Average IAC identifies $150K-200K in annual savings — compressed air is typically the #1 finding.', tags:'DOE · IAC · FREE AUDIT'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate heat recovery on largest compressors. 100 HP rejects ~210,000 BTU/hr. $5K-15K installed. Payback 1-2 heating seasons in cold climates.', tags:'HEAT RECOVERY · ENERGY · PAYBACK'},
    {pri:'MONITOR', priClass:'pri-mon', text:'DOE developing minimum efficiency standards for industrial air compressors. Monitor Federal Register. Also monitor CAGI performance verification updates — new test standards may change how OEMs report efficiency.', tags:'DOE · STANDARDS · EFFICIENCY'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

'calibration': {

  risks: [
    {type:'red', title:'Calibration Is Not Optional', text:'ISO 9001 Clause 7.1.5 requires monitoring and measuring equipment be calibrated at specified intervals against NIST-traceable standards. IATF 16949 (automotive) and AS9100 (aerospace) add further requirements including MSA (Measurement Systems Analysis). A failed audit finding on calibration can result in corrective action, conditional certification, or suspension. Customer audits flag calibration gaps more frequently than any other clause. The cost of non-compliance — lost customers, failed audits, product recalls — dwarfs the calibration program cost.'},
    {type:'blu', title:'The Real Cost Structure', text:'A $500 pressure gauge requiring annual calibration at $75/event costs $750-1,125 in calibration over 10-15 years — more than the instrument itself. Across a 500-instrument program with average $60/calibration, you spend $30,000/year on calibration service alone. But the hidden cost is OOT events: when an instrument is found out of tolerance, every measurement since the last good calibration is suspect. One OOT event on a production gauge can trigger rework evaluation on thousands of parts — $10K-500K depending on volume and product value.'},
    {type:'red', title:'Out-of-Tolerance = Rework Evaluation', text:'When an instrument is found OOT during calibration, ISO 9001 requires you to evaluate the impact on all measurements made since the last good calibration. For a production gauge used daily for 12 months, that could be tens of thousands of parts. The rework evaluation process alone (engineering time, inspection, documentation) costs $5K-20K. If products must be re-inspected or recalled, costs escalate to $50K-500K+. One bad OOT event can exceed your entire annual calibration budget.'},
    {type:'gold', title:'OOT Prevention Strategies', text:'Guard-band: Tighten your acceptance criteria to 80% of the instrument\'s tolerance. If the instrument passes at 80%, it\'s unlikely to drift OOT before the next calibration. Industry calls this T.U.R. (Test Uncertainty Ratio) — target 4:1 minimum.\nTrend monitoring: Track calibration results over time. An instrument drifting toward tolerance limits should be recalibrated sooner or replaced — don\'t wait for it to go OOT.\nInterval adjustment: Instruments with zero OOT history over 3+ calibrations can have intervals extended. Instruments with any OOT should have intervals shortened. This is data-driven interval management — the gold standard.'},
    {type:'red', title:'⚠ Fortive / Fluke / Tektronix / Fluke Calibration', text:'Fortive owns Fluke (multimeters, thermal), Tektronix (oscilloscopes), AND Fluke Calibration (calibration standards). If you buy Fluke instruments, calibrate them with Fluke Calibration standards, and send Tektronix scopes to their cal lab — that is one company across instruments, standards, and calibration service. Either consolidate for volume leverage or verify your ISO 17025 lab is truly independent of the instrument OEM.'},
    {type:'gold', title:'⚠ Trescal Acquisition Strategy', text:'Trescal has been acquiring independent calibration labs across the US. Your local lab may now be Trescal-owned. This consolidation reduces competition in local markets. Verify your cal lab\'s current ownership and monitor for pricing changes post-acquisition. Keep 2-3 qualified labs on your approved vendor list to maintain competitive tension.'},
    {type:'gold', title:'ISO 17025 — Non-Negotiable', text:'Your calibration provider must be accredited to ISO/IEC 17025 by a recognized accreditation body (A2LA, NVLAP, ANAB in the US). 17025 accreditation means the lab\'s calibration processes, uncertainties, and traceability have been independently verified. Using a non-17025 lab means your calibration results may not withstand a customer or certification audit. Check accreditation scope — a lab may be 17025 accredited for electrical but not dimensional.'},
    {type:'blu', title:'The Hybrid Model — Best of Both', text:'Most well-run programs use a hybrid: simple, high-volume instruments (calipers, micrometers, gauges, go/no-go) calibrated in-house by a trained technician. Complex, low-volume instruments (CMMs, oscilloscopes, analytical, reference standards) outsourced to a 17025-accredited lab. This captures 60-70% of the cost savings of in-house while avoiding the investment in specialized capabilities you only need occasionally. The break-even point is typically around 300-500 instruments for the hybrid model.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — FIX PAST-DUE INSTRUMENTS', priClass:'pri-urg', text:'Pull your calibration database today. Identify every instrument past its calibration due date. Either send it for immediate calibration (rush if necessary) or remove it from service with a "DO NOT USE — OUT OF CALIBRATION" tag. Past-due instruments in use are the #1 audit finding and create rework exposure on every part measured. Fix this before anything else.', tags:'PAST-DUE · AUDIT · COMPLIANCE'},
    {pri:'URGENT — OOT EVALUATION', priClass:'pri-urg', text:'Review your last 12 months of calibration certificates. Identify every OOT result. For each one, verify that an impact assessment was documented: what was measured, how much out of tolerance, were products affected, what was the disposition. If any OOT event lacks a documented evaluation — create one now before your next audit.', tags:'OOT · DOCUMENTATION · REWORK'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Optimize calibration intervals based on data. Pull 3+ years of calibration history. For each instrument type: if OOT rate is below 2%, extend the interval (12→18 or 18→24 months). If OOT rate exceeds 5%, shorten it (12→6 months). This data-driven approach reduces calibration volume 20-40% while actually improving quality by focusing resources on unstable instruments.', tags:'INTERVAL · OPTIMIZATION · DATA-DRIVEN'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Consolidate calibration providers. Most facilities use 3-5 cal labs (OEM labs, local independents, national chains) without volume leverage on any of them. Consolidate to 1-2 primary labs for 80%+ of volume. Negotiate volume pricing tiers and turnaround time SLAs. Transcat, Trescal, and Simco all offer multi-site national contracts with volume discounts of 10-20%.', tags:'CONSOLIDATION · VOLUME · PRICING'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate in-house calibration for your highest-volume instrument type. If 60%+ of your calibrations are dimensional (calipers, micrometers, gauges), a gauge block set ($3K-8K), training ($2K-5K), and a half-time technician handles them all in-house at 40-60% below outsourced cost. Continue outsourcing complex and low-volume instruments. The hybrid model is the sweet spot for 300-1,000 instrument programs.', tags:'IN-HOUSE · HYBRID · SAVINGS'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Verify all calibration providers are ISO/IEC 17025 accredited for the specific parameters you are sending them. Check the accreditation scope — not just the certificate. A lab accredited for electrical calibration is NOT qualified to calibrate your dimensional instruments. Use the A2LA or NVLAP online directories to verify current accreditation scope for each lab.', tags:'17025 · ACCREDITATION · SCOPE'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Trescal is actively acquiring independent US calibration labs, consolidating the market. Monitor your cal lab ownership — if your preferred independent gets acquired by Trescal or Transcat, pricing and service levels may change. Maintain 2-3 qualified labs on your approved vendor list to ensure competitive options regardless of M&A activity.', tags:'CONSOLIDATION · TRESCAL · COMPETITION'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  risks: [
    {type:'red', title:'Steel — 30% of Equipment Cost', text:'Every machine tool, press, and furnace is steel-intensive. Section 232 adds 25% tariff on ALL steel imports regardless of origin. Domestic steel HRC up 18% YTD. An OEM quoting a $500K press today is baking in steel at current prices. If steel continues rising, expect requotes on anything ordered more than 90 days ago.'},
    {type:'gold', title:'Controls = Automation Lock-In', text:'Every major piece of capital equipment comes with an integrated control system — and that control system locks you into an automation ecosystem. A press with a Siemens CNC means Siemens drives, Siemens HMI, Siemens programming tools. Specify the control platform at the time of equipment purchase — not after. This is the most expensive decision inside the equipment buy.'},
    {type:'gold', title:'Freight & Rigging — Don\'t Forget', text:'A 40,000-lb CNC machine costs $15K-40K to ship and rig into place. Specialized hauling (oversize/overweight permits), crane rental, and millwright labor for installation are frequently excluded from the OEM quote. Budget 5-8% of equipment cost for freight, rigging, and installation — and get it quoted before you sign the PO.'},
    {type:'red', title:'⚠ Toyota / Raymond / Bastian', text:'Toyota Industries owns Toyota forklifts, Raymond narrow-aisle trucks, AND Bastian Solutions (automation integrator). If you use Toyota forklifts in the warehouse, Raymond reach trucks in narrow aisles, and Bastian designed your conveyor system — one company. Consolidate the negotiation.'},
    {type:'gold', title:'⚠ KION Debt — Monitor', text:'KION took on significant debt to acquire Dematic in 2016. If you have major Dematic automated systems or Linde/STILL forklifts, monitor KION\'s quarterly earnings. High leverage + rising interest rates = financial stress that could affect service levels and parts availability.'},
    {type:'blu', title:'Why This Tab Exists', text:'The acquisition structure changes the economics more than the equipment price itself. A $1M machine bought new with 80% bonus depreciation, leased over 5 years, or purchased used at $450K from an auction — these are three completely different financial outcomes. Most procurement teams default to "buy new from OEM" without evaluating the alternatives. That default costs money.'},
    {type:'gold', title:'Section 179 — $1.22M Limit (2026)', text:'Section 179 allows you to expense up to $1.22M (2026 limit) of qualifying equipment in the year it\'s placed in service instead of depreciating over its useful life. Applies to new AND used equipment. Phase-out begins at $3.05M total equipment purchases.'},
    {type:'gold', title:'Bonus Depreciation — 80% in 2026', text:'For equipment exceeding the Section 179 limit, bonus depreciation allows 80% first-year write-off (2026), declining to 60% (2027), 40% (2028), 20% (2029), 0% (2030). A $2M machine placed in service in 2026 gets $1.6M first-year depreciation. That\'s real cash flow impact on your tax bill. Applies to new AND used equipment (must be new to you).'},
    {type:'red', title:'Bonus Depreciation Is Declining', text:'2025: 100% → 2026: 80% → 2027: 60% → 2028: 40% → 2029: 20% → 2030: 0%. Every year you wait, the tax benefit shrinks by 20 points. If you\'re going to buy capital equipment in the next 2-3 years, there\'s a strong tax case for doing it in 2026 at 80%.'},
    {type:'gold', title:'Machine Tools — Japan/Germany vs China', text:'The world\'s premium machine tool manufacturers (DMG MORI, Mazak, Okuma, TRUMPF, Grob) are Japanese and German. They enter at 2.4-4.4% MFN duty. Chinese machine tools (Shenyang, Dalian, Haitian) face 25% Section 301 on top of MFN. For precision CNC work, the quality gap between Japanese/German and Chinese machines is significant. The tariff widens an already unfavorable cost-quality equation for Chinese equipment on critical applications.'},
    {type:'gold', title:'Haas — Made in USA', text:'Haas Automation (Oxnard, CA) is the largest US-based CNC machine tool manufacturer. No import duty, no tariff exposure, 100% domestic. For applications where Haas capability meets your precision requirements, it\'s the most tariff-protected option. Haas pricing is typically 30-50% below DMG MORI and Mazak — the trade-off is precision tolerance and build quality on the highest-end work.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'If you have 2027 production capacity needs, place capital equipment POs now. Custom CNC, presses, and furnaces are 9-18 month lead times. Every month of delay is a month your new capacity isn\'t producing revenue. The lead time is the constraint — not the price.', tags:'LEAD TIME · CAPACITY · 2027 PLANNING'},
    {pri:'TAX — ACT BEFORE DECEMBER 31', priClass:'pri-urg', text:'Bonus depreciation is 80% in 2026, dropping to 60% in 2027. On a $1M equipment purchase, that\'s a $200K difference in first-year depreciation. Any equipment that can be placed in service before December 31, 2026 should be — the tax math demands it. Work backward from December 31 to determine your latest PO date given lead times.', tags:'BONUS DEPRECIATION · TAX · TIMING'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Before buying new, check the used equipment market. Hilco Industrial, Heritage Global, Maynards, and Perfection Industrial Sales all have active auction inventory. A 5-10 year old Mazak or DMG MORI CNC at 40-60% of new price with a dealer warranty is often the better financial decision — and it\'s available in weeks, not months.', tags:'USED EQUIPMENT · AUCTION · SAVINGS'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Get freight, rigging, and installation quoted BEFORE signing the equipment PO. A $500K machine with $40K in freight/rigging and $25K in installation is really a $565K purchase. These costs are frequently excluded from OEM quotes and surprise the buyer after the PO is signed. Get total installed cost upfront.', tags:'TOTAL INSTALLED COST · FREIGHT · RIGGING'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Specify the automation/control platform at the time of equipment purchase. A press with a FANUC CNC vs Siemens CNC is a 15-20 year ecosystem decision. Align with your plant\'s existing automation standard to avoid maintaining two parallel spare parts inventories and two sets of trained technicians.', tags:'CONTROLS · AUTOMATION · LOCK-IN'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate forklift fleet: own vs lease vs full-service lease. Toyota, Crown, and Hyster-Yale all offer full-service leases that include maintenance, tires, and battery/charger. For a 50-unit fleet, full-service lease often delivers lower total cost than ownership because the OEM\'s maintenance is more efficient and they replace units before major failures.', tags:'FORKLIFT · FLEET · LEASE vs OWN'},
    {pri:'MONITOR', priClass:'pri-mon', text:'AMT (Association for Manufacturing Technology) publishes monthly US machine tool orders data. This is the leading indicator for capital equipment pricing and lead times. When orders are high, lead times extend and OEMs have less pricing flexibility. When orders soften, negotiating leverage increases. Track the AMT USMTO report quarterly.', tags:'AMT · ORDERS · MARKET INDICATOR'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  risks: [
    {type:'red', title:'Geography Is Destiny', text:'Concrete sets in 60-90 minutes. It cannot be shipped long distances. Your ready-mix supplier options are limited to plants within a 20-30 mile radius of your project site. Aggregates (sand, gravel, crushed stone) are heavy and low-value — freight cost exceeds product cost beyond 30-50 miles. This creates natural geographic monopolies. In many markets, one or two producers control 70-80% of concrete and aggregate supply within your delivery radius. Unlike steel or chemicals, you cannot source from a distant competitor to create leverage. Your leverage comes from project timing, volume commitment, and understanding the producer\'s capacity utilization.'},
    {type:'blu', title:'IIJA Demand Surge', text:'The Infrastructure Investment and Jobs Act (IIJA) is pumping $1.2 trillion into roads, bridges, water systems, broadband, and energy infrastructure through 2030. This creates sustained demand for concrete, aggregates, cement, rebar, and structural steel. Producers have pricing power because demand exceeds capacity in many regions. If you have construction projects in the next 2-3 years, lock in material pricing early — the IIJA demand wave will keep prices elevated through the decade.'},
    {type:'red', title:'The 30-Mile Rule', text:'For ready-mix concrete and aggregates, your market is a circle with a 20-30 mile radius around your project site. Every ready-mix plant and aggregate quarry within that circle is a potential supplier. Every one outside it is not — the physics of concrete setting time and the economics of aggregate freight make long-distance sourcing impossible. Before negotiating, map every producer within your radius. If there are 4+ ready-mix plants, you have competition. If there are 1-2, you have a local monopoly and your leverage is limited to project timing and volume.'},
    {type:'gold', title:'Concrete Pricing Is Hyper-Local', text:'Ready-mix concrete pricing varies 30-50% between metro areas depending on: number of competing plants, local aggregate availability, cement plant proximity, labor costs, and construction demand. A 4,000 PSI mix costs $130-160/yard in competitive markets (Houston, DFW) and $180-220/yard in constrained markets (NYC metro, Bay Area). There is no national concrete price — only local ones. Use USGS cement production data and PCA (Portland Cement Association) regional reports to understand your local market dynamics.'},
    {type:'gold', title:'Aggregate Scarcity — The Hidden Constraint', text:'Aggregate (sand, gravel, crushed stone) is the most consumed natural resource on earth after water. In many urban/suburban areas, quarry permits are impossible to obtain due to zoning, environmental, and NIMBY opposition. When local quarries close and are not replaced, aggregate must be hauled from farther away — driving up cost for every concrete and asphalt project in the region. Check your state\'s USGS mineral survey for aggregate production trends. A region losing quarries is a region where construction costs will only increase.'},
    {type:'blu', title:'Cement — Import Dependency', text:'The US imports 15-20% of its cement (primarily from Canada, Turkey, Greece, China). Cement imports are concentrated in coastal markets where import terminals provide an alternative to domestic producers. Inland markets are more dependent on domestic producers (who know it). If your project is near a port with a cement import terminal, you have an additional competitive lever that inland projects do not.'},
    {type:'red', title:'⚠ CRH — Hidden Everywhere', text:'CRH is the world\'s largest building materials company ($35B revenue) and most US procurement teams do not realize how much of their construction spend goes to CRH subsidiaries. Oldcastle APG (masonry), Oldcastle Infrastructure (precast), Ash Grove (cement), Staker Parson (aggregates/ready-mix), and dozens of regional brands — all CRH. If you buy cement from Ash Grove, masonry from Oldcastle, and precast from Oldcastle Infrastructure — one company. Map your total CRH exposure.'},
    {type:'red', title:'If Your Project Uses Federal Funds, BABA Applies', text:'The Build America, Buy America Act (BABA, part of IIJA) requires that all iron, steel, manufactured products, and construction materials used in federally funded infrastructure projects be produced in the United States. This is broader than the old Buy America (BAA) provisions — BABA covers construction materials (cement, aggregates, glass, fiber optic cable, etc.) that were previously exempt. Every IIJA-funded project must comply. Waivers exist but are narrow and temporary. Non-compliance means replacing materials at your cost and potentially losing federal funding.'},
    {type:'gold', title:'Waivers', text:'Three waiver types: (1) Non-availability: domestic product not available in sufficient quantity/quality. (2) Unreasonable cost: domestic product costs 25%+ more than foreign alternative. (3) Public interest: compliance would be inconsistent with public interest. Waivers are granted by the federal agency (FHWA, EPA, etc.) and require a formal application. The process takes 30-120 days. Plan waiver requests early — they are not a last-minute option.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — LOCK MATERIAL PRICING', priClass:'pri-urg', text:'If you have construction projects in the next 12 months, negotiate material pricing now and lock it for the project duration. Cement producers are implementing 8-12% annual increases. IIJA demand gives them pricing power through the decade. A 6-12 month price lock with a CPI cap protects your budget. Every month of delay is a month of price increases you absorb.', tags:'PRICE LOCK · CEMENT · CONCRETE · REBAR'},
    {pri:'URGENT — BABA COMPLIANCE', priClass:'pri-urg', text:'For any federally funded project, verify BABA compliance on all iron, steel, manufactured products, AND construction materials before ordering. Get signed certifications from every supplier. Put BABA requirements in every PO and subcontract. Non-compliance means material replacement at your cost and potential loss of federal funding. This is not optional.', tags:'BABA · FEDERAL · CERTIFICATION'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Map every ready-mix plant and aggregate quarry within a 30-mile radius of each project site. Use USGS mineral operations database and state geological surveys. Knowing how many competitors exist in your delivery radius tells you exactly how much leverage you have. Four plants = competitive market. Two plants = limited leverage. One plant = take-or-leave pricing.', tags:'LOCAL MARKET · MAPPING · LEVERAGE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'If you have multiple projects in the same metro area over the next 12 months, aggregate them into a single master supply agreement for concrete and aggregates. A 25,000-yard commitment gets dramatically better pricing than five 5,000-yard projects bid separately. The producer sees steady volume to fill their capacity — you get the volume discount and scheduling priority.', tags:'AGGREGATION · VOLUME · MASTER AGREEMENT'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate supplementary cementitious materials (SCMs) — fly ash, slag cement, silica fume — as partial cement replacements in concrete mixes. SCMs reduce cement content 15-40% per yard, lower CO2 emissions (cement is 8% of global CO2), reduce material cost, and often improve concrete durability. Most ready-mix producers can supply SCM blends. Specify SCM allowances in your mix designs.', tags:'SCM · FLY ASH · SLAG · SUSTAINABILITY'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'For large projects, evaluate precast concrete vs cast-in-place. Precast (manufactured in a controlled factory, delivered to site) reduces on-site labor, eliminates weather delays, improves quality consistency, and can be faster to install. Cost premium: 5-15% for material but often offset by reduced labor and schedule. Oldcastle Infrastructure (CRH), Rinker/Quikrete, and regional precasters all offer precast alternatives.', tags:'PRECAST · LABOR · SCHEDULE · QUALITY'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Portland cement producers have announced 8-12% price increases for 2026. Monitor PCA (Portland Cement Association) capacity and production reports. If US cement capacity utilization exceeds 90%, domestic supply is tight and imported cement becomes the only relief valve. Check if your region has a cement import terminal — coastal markets have import options that inland markets do not. Track USGS cement import data quarterly.', tags:'CEMENT · CAPACITY · IMPORTS · PCA'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  risks: [
    {type:'red', title:'Fuel Is Your Biggest Variable Cost', text:'Crude at $98.71/bbl. Diesel at $4.04/gal. Gasoline at $3.48/gal. Hormuz disruption risk extends crude exposure indefinitely. On a 100-vehicle fleet averaging 15,000 miles/year at 15 MPG (mixed fleet), annual fuel spend is ~$350K at current prices. A 20% crude spike adds $70K to your annual fuel bill.'},
    {type:'blu', title:'The Math Has Changed', text:'IRA commercial EV tax credits ($7,500 light-duty, up to $40,000 heavy-duty), falling battery costs (down 80% in 10 years), and $4+ diesel make EV fleet economics viable for many applications NOW — not in 5 years. A Ford F-150 Lightning Pro at $55K minus $7,500 credit = $47.5K. Fuel savings at 15,000 miles/year: ~$3,500/year vs diesel F-150. Maintenance savings: ~$1,500/year (no oil changes, less brake wear). Total annual savings: ~$5,000. Payback on the ICE-to-EV premium: 3-4 years.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'Audit fuel card costs. Compare your current per-gallon transaction fee + rebate structure against 3 competitive providers (WEX, Comdata, EFS). Most fleet managers set up a fuel card program once and never rebid it. Annual savings on a competitive rebid: $0.03-0.08/gal — on 100K gallons that is $3K-8K/year.', tags:'FUEL CARD · REBID · SAVINGS'},
    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'Pull fleet utilization report from your telematics or FMC. Identify every vehicle under 8,000 miles/year. Each underutilized vehicle costs $8K-15K/year in depreciation, insurance, registration, and maintenance regardless of usage. Eliminate, redeploy, or downsize to personal vehicle reimbursement (IRS rate: $0.67/mile in 2024).', tags:'UTILIZATION · RIGHT-SIZE · ELIMINATE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Implement anti-idle policy with telematics enforcement. Most fleets idle 20-30% of engine-on time. At current diesel prices, idle reduction saves $1,700-2,500/vehicle/year on a 50-truck fleet. Samsara, Geotab, and Verizon Connect all offer idle monitoring with driver scorecards and real-time alerts.', tags:'IDLE · TELEMATICS · FUEL SAVINGS'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Model EV total cost of ownership for your 10 best-fit routes (return-to-base, under 150 miles/day). Include IRA credits (45W + 30C), utility EV rates, maintenance savings, and bonus depreciation. If the TCO is lower than ICE — start a pilot. Ford Pro, GM BrightDrop, and Lightning eMotors all offer fleet EV pilot programs.', tags:'EV · TCO · PILOT'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'If you use a Fleet Management Company (Element, ARI, LeasePlan/now Ayvens), audit their management fees and maintenance markup. FMC fees of $50-100/vehicle/month are standard but negotiable. Maintenance network discounts should be transparent — ask for the discount schedule and verify against retail pricing. If they will not share it, that is a red flag.', tags:'FMC · FEES · AUDIT'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Deploy route optimization software if you have 25+ vehicles making daily multi-stop deliveries or service calls. Routific, OptimoRoute, Samsara, and Verizon Connect Reveal all offer it. Typical result: 10-20% reduction in miles driven. On 100 vehicles that is $50K-100K/year in fuel savings alone plus reduced wear and overtime.', tags:'ROUTE · OPTIMIZATION · MILES'},
    {pri:'MONITOR', priClass:'pri-mon', text:'EPA GHG Phase 3 heavy-duty truck emissions standards (model year 2027+) will increase new truck prices $10-20K. CARB Advanced Clean Trucks rule requires increasing EV sales percentages in California. If you operate in California, your next truck purchase may need to be electric. Monitor both federal and state fleet emissions rules.', tags:'EPA · CARB · EMISSIONS · EV MANDATE'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  risks: [
    {type:'red', title:'Missing and Damaged Insulation Costs You Every Hour', text:'DOE\'s 3E Plus software calculates that a 6-inch bare steam pipe at 350°F loses 340 BTU/hr per linear foot. With proper 2-inch insulation, the loss drops to 30 BTU/hr — a 91% reduction. Across a typical plant with 5,000 feet of steam and hot process piping, missing or damaged insulation wastes $200K-500K/year in energy. Insulation pays for itself in 6-24 months. After that, the savings are pure margin — every year, forever.'},
    {type:'blu', title:'Why Nobody Fixes It', text:'Insulation is removed during maintenance (to access valves, flanges, instruments) and not replaced. Over 5-10 years, a well-insulated plant becomes 20-40% bare. Nobody tracks it because insulation is invisible to everyone except the energy bill. An insulation survey with IR (infrared) thermography identifies every bare or damaged section — and the DOE 3E Plus calculator tells you exactly how much each one costs per year in wasted energy.'},
    {type:'gold', title:'DOE 3E Plus — Your Free ROI Calculator', text:'DOE\'s 3E Plus software (free download from energy.gov) calculates heat loss and economic thickness for any pipe, vessel, or flat surface. Input: pipe size, temperature, insulation type, fuel cost, operating hours. Output: annual energy loss in dollars, recommended insulation thickness, and payback period. This is the tool that turns an insulation project from "maintenance wants it" to "finance approved it." Every insulation project should be justified with a 3E Plus analysis.'},
    {type:'blu', title:'Utility Rebates for Insulation', text:'Many utilities offer rebates for industrial insulation projects — typically $0.50-2.00 per therm or $5-20/MMBtu saved annually. Check your utility\'s commercial/industrial efficiency program. The DOE 3E Plus analysis provides the energy savings documentation required for rebate applications. Free money for a project that already has 6-24 month payback.'},
    {type:'gold', title:'Labor Is 65-75% of Installed Cost', text:'Insulation materials are commodity-priced and represent only 25-35% of installed cost. The contractor\'s labor rate, productivity, and overhead are the dominant cost drivers. A 20% difference in labor rate on a $1M insulation project is $130K-150K. Always bid with 3+ contractors and compare labor rates separately from material markup.'},
    {type:'gold', title:'Insulator Workforce Shortage', text:'NCCER and NIA data show the average journeyman insulator is 50+ years old. Apprenticeship programs are not producing enough new insulators to replace retirements. This is a structural shortage that will drive labor rates up 8-12% annually for the foreseeable future. Plan insulation work 6-12 months ahead, schedule during planned outages, and build long-term relationships with 2-3 insulation contractors who prioritize your work.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — WALK THE PLANT', priClass:'pri-urg', text:'Conduct an infrared thermography survey of all steam, hot water, and process piping. A FLIR camera ($300-2,000) or a contracted IR survey ($2K-5K) identifies every bare, damaged, or missing insulation section. Run each finding through DOE 3E Plus to calculate annual energy loss and payback. This becomes your insulation capital project with exact dollar justification.', tags:'IR SURVEY · 3E PLUS · PAYBACK'},
    {pri:'URGENT — REMOVABLE BLANKETS', priClass:'pri-urg', text:'Order removable/reusable insulation blankets for every bare valve, flange, and instrument connection on steam and hot process piping. Shannon Enterprises, Thermaxx Jackets, and Pittsburgh Valve & Fitting all manufacture custom-fitted blankets. Average payback: 3-5 months. This is the fastest ROI in the energy category.', tags:'BLANKETS · VALVES · FASTEST ROI'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Establish a "no bare pipe" policy: any time insulation is removed for maintenance, it must be replaced before the work order is closed. Train maintenance teams to use removable blankets instead of destroying insulation to access valves. This prevents the gradual degradation that turns a well-insulated plant into a 40%-bare plant over 10 years.', tags:'POLICY · MAINTENANCE · PREVENTION'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Inspect cold insulation for vapor barrier damage. Any crack, tear, or open joint in cold insulation allows moisture intrusion — causing corrosion under insulation (CUI) that you cannot see until the pipe fails. CUI is the #1 cause of unplanned piping failure in process plants. Repair vapor barrier damage immediately. Budget for full cold insulation replacement on piping over 15 years old.', tags:'CUI · VAPOR BARRIER · PIPE FAILURE'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Build relationships with 2-3 insulation contractors now. Insulator labor is in shortage and getting worse. Contractors with existing relationships get priority during turnarounds and planned outages. Multi-year service agreements with annual rate locks protect against the 8-12% annual labor escalation and guarantee availability during your maintenance windows.', tags:'CONTRACTOR · RELATIONSHIP · AVAILABILITY'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Schedule refractory inspection during your next planned outage for every furnace, kiln, and boiler. Use thermal imaging on the shell exterior to identify hot spots before opening. Hot spots indicate refractory degradation — every one is energy loss and potential shell damage. Planned refractory repair costs 5-10% of emergency repair. Prevention is always cheaper.', tags:'REFRACTORY · INSPECTION · OUTAGE'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Check your utility\'s industrial efficiency rebate program for insulation projects. Many utilities offer $0.50-2.00/therm saved or $5-20/MMBtu saved annually. The DOE 3E Plus analysis provides exactly the documentation needed for rebate applications. Stack the utility rebate with the project payback for an even faster return.', tags:'UTILITY REBATE · DOE · INCENTIVE'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  risks: [
    {type:'red', title:'Perpetual → Subscription: The Industry-Wide Shift', text:'Software vendors have systematically moved from perpetual licenses (buy once) to annual subscriptions (pay forever). Microsoft 365, Adobe Creative Cloud, Autodesk — all subscription now. What was a $500 one-time purchase is now $300/year forever. Over a 5-year lifecycle, the subscription costs 3x the perpetual license. And vendors raise subscription prices 5-10% annually because switching costs make customers sticky.'},
    {type:'red', title:'Cloud Spend — The New Unmanaged Category', text:'Cloud (AWS, Azure, GCP) is the new "nobody manages it" spend category. Developers spin up resources, forget to shut them down, over-provision instances, and nobody optimizes. Gartner estimates 25-40% of cloud spend is wasted. A $500K annual cloud bill likely has $125K-200K in optimization opportunities — idle instances, oversized VMs, unused storage, and missing reserved instance commitments.'},
    {type:'gold', title:'Voice & WAN Costs Are Declining', text:'Traditional telecom (voice lines, MPLS, PRI trunks) is declining 3-5% annually. VoIP/UCaaS (Teams, Zoom, RingCentral) replaces PBX hardware and PSTN lines. SD-WAN replaces expensive MPLS at 40-60% lower cost with comparable or better performance. If you\'re still paying for MPLS circuits and PRI trunks, you\'re overpaying for technology that the market has moved past.'},
    {type:'gold', title:'Endpoint Refresh Cycles — Extending', text:'PC refresh cycles have extended from 3-4 years to 4-5 years as hardware quality improves. But Windows 10 end-of-support (October 2025) forces a hardware refresh for PCs that can\'t run Windows 11 (TPM 2.0 requirement). This is a one-time cost spike — budget for it but don\'t let Dell/HP/Lenovo use the urgency to overcharge. Get competitive bids from all three.'},
    {type:'red', title:'⚠ Broadcom / VMware — Price Shock', text:'Broadcom acquired VMware in November 2023 and immediately restructured licensing: eliminated perpetual licenses, moved to subscription-only bundles, and raised prices 2-10x for many customers. If you run VMware vSphere, your renewal will be dramatically higher. Evaluate alternatives NOW: Microsoft Hyper-V (free with Windows Server), Nutanix AHV, or Proxmox. The migration is painful but the alternative is accepting Broadcom\'s pricing monopoly on your entire virtualization infrastructure.'},
    {type:'gold', title:'⚠ Oracle Java Licensing', text:'Oracle changed Java SE licensing in 2023 to per-employee pricing (not per-installation). A 1,000-employee company using Java on even one server now owes Oracle $15/employee/month = $180,000/year. Many companies don\'t realize they owe this. Alternatives: OpenJDK, Amazon Corretto, Eclipse Temurin — all free, all production-ready. Migrate off Oracle Java before the audit letter arrives.'},
    {type:'red', title:'The SaaS Sprawl Problem', text:'The average mid-market company (500-5,000 employees) has 130+ SaaS subscriptions. 25-30% are unused (licenses assigned to departed employees or never-adopted tools). 15-20% are redundant (three project management tools, two CRMs, multiple file-sharing platforms). And every one auto-renews annually. Nobody is managing this portfolio — IT buys some, departments buy some on credit cards, nobody reconciles. The result: $50K-500K/year in SaaS waste.'},
    {type:'red', title:'25-40% of Cloud Spend Is Wasted', text:'Gartner and Flexera both estimate 25-40% of enterprise cloud spend is wasted. The causes: idle instances running 24/7 that are only needed 8 hours/day, oversized VMs (production workloads on instances with 4x the CPU/RAM they need), unattached storage volumes, forgotten dev/test environments, and failure to use reserved instances or savings plans for predictable workloads.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'Calendar every software and SaaS renewal date for the next 12 months. File cancellation or non-renewal notices 90 days before each one — even for products you plan to keep. This forces a negotiation instead of an auto-renewal at the vendor\'s price. Missing a renewal window is the #1 source of IT overspend.', tags:'RENEWAL · AUTO-RENEWAL · CALENDAR'},
    {pri:'URGENT — ACT THIS MONTH', priClass:'pri-urg', text:'If you run VMware vSphere, your next renewal will be dramatically higher under Broadcom\'s new pricing. Start evaluating alternatives NOW: Hyper-V (included with Windows Server), Nutanix AHV, Proxmox, or migration to cloud-native. Even if you decide to stay with VMware, having a credible alternative is your only negotiating leverage against Broadcom\'s pricing.', tags:'VMWARE · BROADCOM · ALTERNATIVES'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Run a SaaS audit. Pull 12 months of AP and credit card data. Identify every recurring software charge. Match licenses to active users. Eliminate unused subscriptions, consolidate redundant tools, and right-size remaining licenses. Expected savings: 15-30% of total SaaS spend.', tags:'SaaS · AUDIT · RATIONALIZATION'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Check your cloud provider\'s cost optimization dashboard (AWS Cost Explorer + Compute Optimizer, Azure Cost Management + Advisor). Implement their recommendations: right-size oversized instances, schedule dev/test auto-shutdown, buy reserved instances for 24/7 production workloads. Expected savings: 25-40% of cloud bill.', tags:'CLOUD · AWS · AZURE · OPTIMIZATION'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'If you\'re still paying for MPLS WAN circuits, evaluate SD-WAN. Cisco Viptela, Fortinet, VMware VeloCloud, and Palo Alto Prisma all offer SD-WAN at 40-60% lower cost than MPLS with comparable or better performance. SD-WAN uses commodity internet (broadband/LTE) with intelligent routing instead of dedicated circuits. The ROI is immediate.', tags:'SD-WAN · MPLS · TELECOM'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Verify Oracle Java compliance. If you have Oracle Java SE installed anywhere in your environment, you may owe per-employee licensing fees under Oracle\'s 2023 pricing model. Audit Java installations, migrate to OpenJDK/Amazon Corretto/Eclipse Temurin where possible, and restrict Oracle Java to applications that specifically require it. Do this before Oracle\'s audit team contacts you.', tags:'ORACLE · JAVA · COMPLIANCE'},
    {pri:'MONITOR', priClass:'pri-mon', text:'AI/Copilot pricing is the next wave of IT cost expansion. Microsoft Copilot ($30/user/month on top of M365), Salesforce Einstein, ServiceNow AI — every major vendor is adding AI tiers at premium pricing. Before signing up for enterprise AI licenses, pilot with 10-20 users and measure actual productivity gains. Don\'t buy 1,000 Copilot licenses based on a demo.', tags:'AI · COPILOT · PILOT FIRST'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

    {type:'gold', title:'The Unmanaged Spend Problem', text:'Janitorial and facilities is the category most likely to have ZERO strategic sourcing attention. Every plant, office, and warehouse buys tissue paper, trash bags, hand soap, and cleaning chemicals — but nobody negotiates them. The result: each facility buys from whoever shows up (local janitorial distributor, Staples, Amazon, Costco), at whatever price they quote, with no contract and no volume leverage. Typical overspend: 15-40% vs. what a GPO or consolidated contract would deliver.'},
    {type:'blu', title:'The Opportunity', text:'This is the easiest category to save money in because nobody has tried. A single GPO membership (OMNIA Partners, Vizient/Provista) or a consolidated contract with a national distributor (HD Supply, Staples Business Advantage, Cintas) typically saves 15-25% across the entire category. On $500K annual Jan/San spend, that\'s $75K-125K/year — for a procurement initiative that takes 2-4 weeks to implement.'},
    {type:'red', title:'⚠ Ecolab Empire', text:'Ecolab (NYSE: ECL, $14B revenue) touches more facilities categories than any other single company: Nalco Water (cooling/boiler), cleaning chemicals, pest elimination, food safety, textile care, and Purolite (ion exchange). A mid-size manufacturer could easily have $500K-1M+ in total Ecolab spend across 4-5 different service lines — each managed by a different internal team with no cross-visibility. Map it. Negotiate it as one relationship.'},
    {type:'gold', title:'Dispenser Lock-In — The Hidden Cost of "Free" Equipment', text:'GP, KC, and Essity all offer "free" dispenser installation. The catch: proprietary dispensers only accept the manufacturer\'s paper products. You save $2,000 in dispenser costs and lock yourself into 5+ years of above-market paper product pricing. If you\'re planning a restroom refresh, specify Tork or universal-compatible dispensers that accept multiple brands. Or negotiate the paper product pricing BEFORE accepting the "free" dispensers.'},

    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'Check your Waste Management and Republic Services contract auto-renewal dates. These contracts auto-renew with 3-5% annual escalators. File a termination notice 90 days before renewal even if you plan to stay — it opens the negotiation. Get 3 bids: WM, Republic, and one regional hauler. Typical savings on rebid: 10-20%.', tags:'WASTE · AUTO-RENEWAL · REBID'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Map your total Ecolab spend: Nalco Water (boiler/cooling), cleaning chemicals (jan/san), pest control, food safety, Purolite (resin). Each service is often managed by a different person with no cross-visibility. Consolidate the negotiation. Total Ecolab spend of $500K+ gives you leverage no single service line has.', tags:'ECOLAB · CROSS-CATEGORY · LEVERAGE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Audit your restroom dispenser fleet. If all dispensers are proprietary (Enmotion, Scott, etc.), you\'re locked into one paper product supplier. For the next dispenser refresh, specify universal-compatible models or negotiate paper product pricing as a condition of accepting new dispensers. Never accept "free" dispensers without a paper contract.', tags:'DISPENSER · LOCK-IN · PAPER'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Switch from ready-to-use cleaning chemicals to concentrated products with proportioning dispensers. Concentrated chemicals diluted on-site cost 30-50% less per use than pre-mixed. Reduce freight (shipping water is expensive), reduce storage space, and improve consistency (proportioner delivers exact dilution every time vs. employees guessing).', tags:'CONCENTRATED · CHEMICALS · SAVINGS'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'For outsourced janitorial contracts: implement SLA-based agreements with inspection scoring and penalty clauses. ABM, Marsden, and C&W all accept this structure. Monthly inspections with a standardized scorecard (1-5 rating per area), penalty triggers below 3.5 average, and quarterly business reviews. This is how you get consistent quality from a high-turnover workforce.', tags:'SLA · CLEANING · QUALITY'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Waste hauling costs will increase as landfill capacity tightens and recycling markets fluctuate. China\'s National Sword policy permanently disrupted recycling economics — contaminated recyclables now go to landfill, increasing disposal costs. Monitor your hauler\'s recycling revenue share (if any) and verify that recyclables are actually being recycled, not landfilled at recycling rates.', tags:'WASTE · RECYCLING · LANDFILL'},

},

  risks: [
    {type:'red', title:'The Feedstock Chain: Crude → NGL → Monomer → Resin → Your Part', text:'Crude oil → cracking → ethylene (PE feedstock) and propylene (PP feedstock). Natural gas → ethane → ethylene. Every step has a margin, a processing cost, and market dynamics. Your resin price is the end of a 4-5 step chain that starts with crude oil and natural gas. Understanding the chain is the foundation for every pricing negotiation. If your supplier says "costs are up" — ask which feedstock, how much, and show them the published index to verify.'},
    {type:'red', title:'Never Accept "Market-Based" Pricing', text:'"Market-based" or "prevailing market" pricing means the supplier sets the price with no published reference. You have no way to verify the increase. On a $2M annual resin spend, a supplier charging 3% above the actual market index costs you $60K/year in hidden margin. Always tie pricing to a published index (CDI, ICIS, or BLS PPI at minimum).'},
    {type:'gold', title:'⚠ LyondellBasell / A. Schulman', text:'LyondellBasell acquired A. Schulman (one of the largest independent compounders) in 2018. If you buy PP resin from LyondellBasell AND custom compounds from what was A. Schulman — same company. The vertical integration means your compounder and resin supplier can coordinate pricing. Verify your compounder\'s resin sourcing to ensure competitive tension.'},
    {type:'gold', title:'US Is a Net Exporter of Commodity Resins', text:'The US is one of the world\'s largest PE and PP producers (Gulf Coast ethane cracker advantage). Commodity resin tariffs are largely irrelevant because domestic supply exceeds demand — the US exports PE and PP. Tariff exposure is concentrated in engineering plastics (nylon, polycarbonate, specialty compounds) sourced from Asia, where Section 301 adds 25% on Chinese-origin material. For commodity PE/PP, the cost driver is crude/NGL pricing, not trade policy.'},
    {type:'gold', title:'AD/CVD — PET Resin From China', text:'Antidumping and countervailing duties are active on PET resin from China, India, and other countries. Combined rates can reach 40-80% depending on the exporter. If you buy PET for packaging or thermoforming, verify country of origin. US producers (Indorama Ventures, DAK Americas, Far Eastern) supply the domestic market competitively without AD/CVD exposure.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — INDEX YOUR CONTRACTS', priClass:'pri-urg', text:'If any resin contract uses "market-based" or "quarterly negotiation" pricing without a published index reference, fix it now. Move to formula pricing: published CDI or ICIS index + fixed conversion fee. On $2M annual resin spend, a supplier charging 3% above published market costs $60K/year in hidden margin. Index-based pricing makes every penny verifiable.', tags:'INDEX · CDI · ICIS · FORMULA PRICING'},
    {pri:'URGENT — VERIFY COMPOUNDER PASS-THROUGH', priClass:'pri-urg', text:'If you buy custom compounds, request the resin index your compounder uses for pass-through pricing. Verify it matches CDI or ICIS published data — not a "proprietary" index. Pull the last 12 months of pass-through adjustments and compare to published index movement. Any consistent gap above 1-2% is margin padding. Call it out with data.', tags:'COMPOUNDER · PASS-THROUGH · AUDIT'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Negotiate quarterly adjustment caps (±5% per quarter) on your largest resin contracts. Caps smooth volatility for budgeting without eliminating the supplier\'s ability to pass through legitimate cost changes. A 5% quarterly cap limits your annual exposure to ±20% while still allowing the market to clear. Both sides benefit from predictability.', tags:'CAP · QUARTERLY · VOLATILITY'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'If you consume 1M+ lbs/year of any single resin grade, get a direct allocation from the producer (Dow, LyondellBasell, ExxonMobil, INEOS) rather than buying through a distributor. Direct pricing is typically 5-10% below distributor pricing. At 1M lbs of PE at $0.80/lb, that is $40K-80K in savings. Producers allocate directly to customers above volume thresholds.', tags:'DIRECT · PRODUCER · VOLUME'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate post-consumer recycled (PCR) resin for non-critical applications. PCR PE and PP trade at 0-15% premium over virgin depending on grade and availability. Sustainability mandates (California SB 54, EU Packaging Regulation) are creating demand pull for PCR. Locking in PCR supply now — before mandates tighten — secures availability and positions you ahead of competitors scrambling to comply later.', tags:'PCR · RECYCLED · SUSTAINABILITY'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'For natural rubber users: hedge with SICOM (Singapore Commodity Exchange) futures or physical forward contracts through a rubber broker (Halcyon Agri, R1 International). Natural rubber is weather-dependent (90% from Thailand, Indonesia, Malaysia) and subject to supply shocks from monsoons, disease (leaf blight), and export restrictions. A 3-6 month forward position smooths procurement cost.', tags:'NATURAL RUBBER · HEDGE · FORWARD'},
    {pri:'MONITOR', priClass:'pri-mon', text:'New Gulf Coast PE/PP capacity (ExxonMobil Baytown expansion, Shell Monaca PA, Formosa Sunshine LA) coming online 2026-2027. When these crackers reach full production, US PE/PP supply increases significantly. Watch ICIS capacity utilization — when it drops below 85%, pricing power shifts to buyers. Time your next contract renewal to coincide with capacity additions for maximum leverage.', tags:'CAPACITY · EXPANSION · TIMING · LEVERAGE'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

  desc: 'Managed print services (MPS), copier/printer fleet, toner/ink, copy paper, general office supplies, breakroom supplies, and promotional print. The #1 declining procurement category — print volumes down 30-50% since 2019 with hybrid work. Yet most companies still have the same number of printers, the same MPS contracts, and the same office supply spend as pre-COVID. The opportunity is right-sizing a fleet and contract that was built for an office that no longer exists at full capacity.',
