  risks: [
    {type:'red', title:'Your Print Fleet Is Sized for 2019', text:'Hybrid work permanently reduced office print volumes 30-50%. But most companies still have the same number of copiers, the same MPS contract minimums, and the same per-page rates negotiated when the office was at full capacity. A 100-person office that printed 200,000 pages/month in 2019 now prints 100,000-140,000 — but the MPS contract minimum is still 200,000 pages. You are paying for 60,000-100,000 pages you do not print. This is free money waiting to be recovered.'},
    {type:'blu', title:'Office Supplies — The Amazon Effect', text:'Amazon Business has disrupted traditional office supply contracts (Staples Business Advantage, Office Depot/ODP). Amazon\'s pricing on commodity items (pens, paper, folders, sticky notes) is typically 15-30% below contract pricing from traditional office supply companies. For most organizations, the optimal strategy is: contracted pricing on top 50 SKUs with a traditional supplier + Amazon Business for the long tail of commodity items.'},
    {type:'red', title:'How MPS Contracts Work Against You', text:'A Managed Print Services contract bundles hardware lease, maintenance, toner, and service into a single monthly payment — typically structured as a base charge (minimum pages) plus a per-page overage rate. The provider (Xerox, Ricoh, Canon, Konica Minolta) profits most when your actual volume is well below the minimum — you pay the base regardless. MPS contracts were sized in 2018-2019 when offices were full. Post-COVID, most organizations print 30-50% less but pay the same base. The provider has no incentive to tell you this.'},
    {type:'gold', title:'⚠ Amazon Business — The Disruptor', text:'Amazon Business is taking share from Staples and Office Depot on commodity office supplies. Pricing is 15-30% below contract rates on most items. Business Prime adds free shipping, approval workflows, and analytics. For organizations spending under $100K/year on office supplies, Amazon Business may eliminate the need for a traditional contract entirely. For larger programs, use Amazon pricing as your benchmark in Staples/ODP negotiations.'},
    {type:'gold', title:'⚠ Compatible Toner Market', text:'LD Products, Clover Imaging Group, V4INK, Ink E-Sale — all offer compatible/remanufactured toner cartridges at 40-60% below OEM pricing. Quality on modern compatibles is within 5% of OEM for standard office printing. The risk: using compatible toner voids your MPS service agreement. Only switch to compatible if you are self-managing your fleet or your MPS contract explicitly allows it.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — MPS CONTRACT REVIEW', priClass:'pri-urg', text:'Pull your MPS contract. Check: (1) monthly minimum page commitment vs actual volume, (2) auto-renewal date and cancellation window, (3) device count floor, (4) per-page rate for B&W and color. If actual volume is 30%+ below the minimum, you are overpaying immediately. File termination notice to force renegotiation even if renewal is months away.', tags:'MPS · MINIMUM · AUTO-RENEWAL · REVIEW'},
    {pri:'URGENT — FLEET COUNT', priClass:'pri-urg', text:'Pull meter reads for every printer and copier. Any device below 2,000 pages/month is a candidate for removal. Each removed MFP saves $200-500/month. Target fleet ratio: 1 MFP per 15-25 employees (post-COVID). If you still have 1 per 8-10, your fleet is 40-60% oversized. Remove devices, consolidate to fewer high-utilization units.', tags:'FLEET · RIGHT-SIZE · METER READS'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Implement print policies that cost nothing: default duplex (saves 20-30% on paper), default B&W (color on request saves 60-80% per page in toner), and pull-printing/secure print release (reduces waste prints 10-20%). These are configuration changes in your print server — no hardware or contract changes needed.', tags:'DUPLEX · B&W DEFAULT · PULL-PRINT'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Benchmark your office supply contract (Staples/ODP) against Amazon Business pricing on your top 50 SKUs by spend. Amazon is typically 15-30% cheaper on commodity items (paper, pens, toner, breakroom). Use the comparison as negotiation leverage — or split the business: contract for top 50, Amazon for the tail.', tags:'AMAZON · BENCHMARK · OFFICE SUPPLIES'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'If your fleet is under 10 devices, evaluate exiting MPS entirely. Buy or lease devices independently ($200-400/month each for quality MFPs via HP, Canon, or Kyocera dealers). Use compatible toner (40-60% savings). Contract maintenance separately or use break-fix. Self-managed printing at small scale is 25-40% cheaper than MPS.', tags:'SELF-MANAGED · COMPATIBLE TONER · EXIT MPS'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Audit breakroom supplies. Coffee, water delivery, snacks, and breakroom consumables are often on auto-replenishment at inflated pricing from a legacy vendor. Coffee services (Aramark, Canteen/Compass) typically charge 2-3x what direct-purchase from Costco or Amazon would cost. For a 100-person office, breakroom optimization saves $5K-15K/year.', tags:'BREAKROOM · COFFEE · AUTO-REPLENISHMENT'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Print volume continues to decline 5-8% annually as digital workflows replace paper processes. Every year your fleet should get smaller, your minimum commitment should decrease, and your total print spend should decline. If your MPS spend is flat or increasing year-over-year while volume drops — the provider is extracting margin from a shrinking category. Push back at every renewal.', tags:'DECLINING VOLUME · ANNUAL REVIEW · TREND'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

'professional-services': {
  domain: 'Sourcing Intelligence',
  name: 'Professional Services',
  desc: 'Legal, accounting/audit, management consulting, engineering services, environmental consulting, IT consulting, and recruiting/search firms. The most relationship-driven category in procurement — and the one where scope creep, hourly billing, and "trusted advisor" dynamics create the least price discipline. Most companies have never competitively bid their outside legal, audit, or consulting relationships. The savings opportunity is 15-30% through rate benchmarking and scope management alone.',
  metrics: [

      {cells:['Boutique/Specialty','Niche','$200-600/hr','Variable','Expertise'], nameStyle:true, badge:'b-strong'}

    trees: [

  },
  risks: [
    {type:'red', title:'The "Trusted Advisor" Tax', text:'Professional services are the one category where the buyer (usually a VP or C-suite executive) has a personal relationship with the provider (law firm partner, audit partner, consulting lead). That relationship makes competitive bidding feel disloyal. The result: most companies have used the same outside counsel for 10+ years, the same auditor since inception, and the same consultant for every strategy project — without ever benchmarking their rates or testing the market. The "trusted advisor" premium is typically 15-30% above what a competitive process would deliver.'},
    {type:'blu', title:'The Hourly Billing Problem', text:'Hourly billing is the dominant pricing model for legal and consulting. It creates a fundamental misalignment: the provider earns more when work takes longer. An efficient lawyer who resolves a matter in 20 hours earns half what an inefficient one does in 40 hours — for the same outcome. Alternative fee arrangements (AFAs) — fixed fees, capped fees, success fees, blended rates — align the provider\'s incentive with yours. Yet only 20-30% of legal work and 40% of consulting work uses AFAs. The rest is uncapped hourly billing.'},
    {type:'red', title:'Most Companies Have Never Benchmarked Professional Service Rates', text:'A mid-market company ($500M-5B revenue) typically spends $2M-15M/year on professional services across legal, audit, consulting, and engineering. Of that, 60-70% goes to providers whose rates have never been compared to market benchmarks. The first-ever rate benchmarking exercise typically finds 15-30% savings opportunity — not because providers are overcharging maliciously, but because without competitive pressure, rates drift upward 3-5% annually and nobody pushes back.'},
    {type:'gold', title:'The Billing Guidelines Nobody Sends', text:'Fortune 500 companies routinely send outside counsel billing guidelines that restrict: block billing (must itemize each task), minimum time increments (no 0.5hr for a 5-minute call), partner-level work on associate tasks, inter-office conferences billed to client, and travel time at full rate. Most mid-market companies do not have billing guidelines — which means no controls on how hours are billed. Implementing billing guidelines alone reduces legal spend 5-10% with zero impact on quality.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — SPEND VISIBILITY', priClass:'pri-urg', text:'Pull 12 months of AP data for all professional services. Categorize by provider, sub-category (legal, accounting, consulting, engineering, IT, recruiting), and matter/project. Most companies discover 20-40% more professional services spend than they thought — buried in departmental budgets, p-card charges, and cost centers that procurement never sees. You cannot manage this category without knowing the total.', tags:'SPEND ANALYSIS · AP DATA · VISIBILITY'},
    {pri:'URGENT — RATE BENCHMARK', priClass:'pri-urg', text:'Request rate cards from your top 10 professional service providers. Compare to the benchmark ranges in the Rate Benchmarking tab. Any rate above the 75th percentile for your market and matter complexity is over-market. Use the benchmark data in your next rate negotiation. Most providers will reduce rates 10-15% when presented with competitive data rather than lose the relationship.', tags:'RATE CARD · BENCHMARK · NEGOTIATE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Implement billing guidelines for outside legal and consulting. Restrict: block billing, minimum billing increments above 0.1 hours, partner time on associate-level tasks, travel at full rate, inter-office conferences billed to client, and duplicative staffing. Send the guidelines to every provider with a statement that non-compliant invoices will be adjusted. Expected savings: 5-10% of legal/consulting spend with zero quality impact.', tags:'BILLING GUIDELINES · INVOICE · CONTROLS'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Convert your top 5 routine legal matters to fixed-fee arrangements. Contract review, employment compliance, routine regulatory filings, real estate transactions, and standard IP filings are all predictable enough to price on a fixed-fee basis. Your law firm will resist — hourly billing is more profitable for them. Your leverage: "If you cannot quote a fixed fee for routine work you have done for us 50 times, we will find a firm that can."', tags:'FIXED FEE · LEGAL · AFA'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Build a tiered provider strategy for legal: Tier 1 (Am Law 100) for high-stakes litigation, M&A, regulatory. Tier 2 (strong regional firms) for commercial contracts, employment, real estate, IP prosecution. Tier 3 (ALSP or AI-enabled providers) for document review, due diligence, contract abstraction. Each tier is 30-50% cheaper than the one above for work that does not require the higher tier\'s resources.', tags:'TIERED STRATEGY · LEGAL · COST'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Competitively bid non-audit accounting services. Tax advisory, transfer pricing, consulting, and internal audit co-sourcing from your audit firm should be bid against Big 4 competitors and mid-tier firms (BDO, RSM, Grant Thornton, Crowe). The audit relationship should not automatically grant the firm all advisory work. For private companies, competitively bid audit itself every 5-7 years.', tags:'AUDIT · TAX · COMPETITIVE BID'},
    {pri:'MONITOR', priClass:'pri-mon', text:'AI is transforming professional services economics. Legal AI (Harvey, CoCounsel, Luminance) reduces associate hours 30-50% on contract review, research, and due diligence. Accounting AI automates reconciliation and audit sampling. Ask every provider: what AI tools do you use, and how do they reduce my bill? If they say "none" — they are either behind or pocketing the productivity gain. Either way, you should not be paying 2024 rates for 2019 productivity.', tags:'AI · PRODUCTIVITY · BILLING'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

'staffing': {
  domain: 'Sourcing Intelligence',
  name: 'Temporary Labor & Staffing',
  desc: 'Industrial temporary staffing (production, warehouse, maintenance), skilled trades placement, temp-to-hire programs, managed staffing providers (MSPs), and vendor management systems (VMS). Staffing markup is the #1 cost lever — most companies do not know what they are paying as a percentage of bill rate. The typical industrial staffing markup is 35-55% over the worker\'s pay rate. Negotiating this to 25-35% is the single biggest savings opportunity.',

      {cells:['Randstad','AMS: RAND','Manufacturing','35-50%','Low'], nameStyle:true, badge:'b-strong'},
      {cells:['ManpowerGroup','NYSE: MAN','General/Skilled','30-45%','Low'], nameStyle:true, badge:'b-strong'},
      {cells:['Robert Half','NYSE: RHI','Professional','25-35%','Low'], nameStyle:true, badge:'b-strong'},
      {cells:['Kelly Services','NASDAQ: KELYA','Engineering/Tech','28-40%','Low'], nameStyle:true, badge:'b-strong'},
      {cells:['TrueBlue (PeopleReady)','NYSE: TBI','Industrial/Day','40-55%','Medium'], nameStyle:true, badge:'b-watch'},
      {cells:['Regional/Local Agencies','Various','Mixed','35-55%','Variable'], nameStyle:true, badge:'b-watch'}
    ],
    trees: [
    ]
  },
  risks: [
    {type:'red', title:'You Are Paying 35-55% Over What the Worker Earns', text:'When you pay a staffing agency $28/hour for a production worker, the worker receives $18-20/hour. The rest ($8-10/hour) is the agency\'s markup covering: employer payroll taxes (7.65% FICA), workers comp insurance (5-15% for industrial), unemployment insurance (2-5%), ACA compliance, recruiter overhead, and profit. At 55% markup on a $20/hr worker, the bill rate is $31/hr. At 35% markup, it is $27/hr. That $4/hr difference on 100 temps working 2,000 hours/year = $800K/year.'},
    {type:'gold', title:'Turnover Is the Real Expense', text:'Industrial temp turnover runs 100-300% annually. Every turnover event costs $3,000-5,000 (recruiting, onboarding, training, lost productivity during ramp-up). On a 100-person temp workforce with 150% turnover, you are spending $450K-750K/year on turnover alone — often more than the staffing markup. Reducing turnover from 150% to 100% saves $150K-250K/year. The solution is pay rate competitiveness (raise the worker\'s pay by $1-2/hr and capture it back through lower markup and reduced turnover).'},
    {type:'gold', title:'Benchmark Markup Ranges', text:'Light industrial / warehouse: 30-40% (target 30-35%)\nManufacturing / production: 35-45% (target 32-38%)\nSkilled trades (welders, electricians): 25-35% (target 25-30%)\nProfessional / technical: 25-35% (target 22-28%)\nClerical / admin: 40-55% (target 35-42%)\n\nIf your current markup exceeds the upper range — you have immediate negotiation opportunity. If it falls below the target — verify the agency is paying competitive wages and carrying proper insurance.'},
    {type:'blu', title:'VMS — The Visibility Tool', text:'A Vendor Management System (VMS) like SAP Fieldglass, Beeline, or Coupa Contingent Workforce forces markup transparency across all staffing providers. Every order, fill, timesheet, and invoice is tracked. You see the pay rate and the bill rate separately. VMS pays for itself on programs over $5M/year in temp spend through markup visibility alone. Below $5M, a simple spreadsheet tracking pay rate vs bill rate by provider achieves 80% of the visibility at zero cost.'},
    {type:'blu', title:'Temp-to-Hire Conversion Fee', text:'Most staffing contracts include a conversion (temp-to-hire) fee of 15-25% of the worker\'s annual salary — or a minimum hours requirement (typically 520-720 hours) after which the fee is waived. If you are hiring 30%+ of your temps permanently, negotiate the conversion terms upfront: lower the percentage, reduce the minimum hours, or negotiate a declining fee schedule (e.g., 20% at 0 hours, 10% at 520 hours, 0% at 720 hours).'},
    {type:'gold', title:'⚠ Employbridge Brands', text:'Employbridge operates under multiple brand names: ResourceMFG, ProLogistix, Remedy, Select, ProDrivers. If you use two or more of these brands at different facilities, they are the same company. Consolidate the negotiation for volume leverage — they may not volunteer this information.'},
  ],
  riskSource: 'USTR, ITC, BLS, SEC EDGAR, FSA analysis',
  actions: [
    {pri:'URGENT — KNOW YOUR MARKUP', priClass:'pri-urg', text:'Request markup disclosure from every staffing provider: pay rate, payroll burden, workers comp rate by classification, overhead, and margin. If a provider will not disclose — that is a provider earning 50%+ markup that does not want you to know. Transparency is non-negotiable. Put it in the contract.', tags:'MARKUP · TRANSPARENCY · DISCLOSURE'},
    {pri:'URGENT — ACT THIS WEEK', priClass:'pri-urg', text:'Benchmark temp pay rates against BLS OES for your metro area and occupation codes. If temps are paid below 25th percentile, you have a turnover problem that no staffing provider can solve — the pay rate is the problem. Raising pay $1-2/hr and negotiating 3-5 points off the markup costs the same bill rate but dramatically reduces turnover.', tags:'PAY RATE · BLS OES · TURNOVER'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Consolidate from 5-10 staffing providers to 2-3. One primary provider for 60-70% of volume (better fill rates, lower markup on volume commitment), one secondary for backup and competitive tension, one specialty for skilled trades. Volume concentration = negotiating power + operational simplicity.', tags:'CONSOLIDATION · VOLUME · LEVERAGE'},
    {pri:'STRATEGIC — 30 DAYS', priClass:'pri-act', text:'Negotiate temp-to-hire conversion terms: declining fee schedule (20% at 0 hours, 10% at 520 hours, 0% at 720 hours) rather than flat 20-25% regardless of tenure. If you convert 30%+ of temps, conversion fees are a major cost. Best practice: 0% conversion fee after 720 hours (approximately 4 months full-time).', tags:'CONVERSION · TEMP-TO-HIRE · FEE'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'If temp spend exceeds $5M/year, evaluate a Vendor Management System (VMS). SAP Fieldglass, Beeline, and Coupa Contingent all offer it. VMS forces markup transparency, standardizes ordering, tracks fill rates and quality metrics, and creates a competitive marketplace among your staffing providers. Typical VMS savings: 8-15% of total contingent workforce spend.', tags:'VMS · TECHNOLOGY · VISIBILITY'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Track workers comp claims by staffing provider. An agency with high claims has high SUTA and workers comp rates — which they pass through to you in the markup. A safer agency has lower insurance costs and can offer lower markups. Make safety performance a selection criteria: request EMR (Experience Modification Rate) and OSHA recordable rate from every provider.', tags:'SAFETY · WORKERS COMP · EMR'},
    {pri:'MONITOR', priClass:'pri-mon', text:'Manufacturing wage growth at 7.2% (BLS ECI). Staffing providers will pass through wage increases — legitimate. But audit every rate increase: verify the increase goes to the worker\'s pay rate at the same markup percentage. A bill rate increase that expands the markup percentage (from 38% to 42%) is the agency taking margin, not the worker getting a raise.', tags:'WAGE INFLATION · AUDIT · MARGIN CREEP'},
  ],
  actionSource: 'FSA analysis — BLS, FRED, SEC EDGAR, USTR'
},

    {pri:'URGENT — RUN THE MATH', priClass:'pri-urg', text:'Pull 12 months of rental invoices. Calculate total cost per employee per year including all charges (rental, loss/damage, adds/deletes, fuel surcharges). Compare to direct purchase + commercial laundry. The gap is your leverage document. On 200 employees at $15/week rental vs $400 purchase + $200 laundry, that is $156K/year rental vs $120K — $36K savings plus you own the garments.', tags:'RENT vs BUY · COST ANALYSIS'},

    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'If switching to direct purchase: establish a safety footwear program through a boot mobile service (Red Wing, Timberland PRO, Wolverine all offer on-site fitting). Annual boot allowance ($150-200/employee) is typically cheaper than rental and employees prefer choosing their own boots. Reduces turnover friction.', tags:'FOOTWEAR · BOOT ALLOWANCE · RETENTION'},
    {pri:'STRATEGIC — NEXT QUARTER', priClass:'pri-str', text:'Evaluate embroidered vs rental for branded workwear. Direct purchase garments with company logo embroidery ($3-8 per garment) plus a garment care allowance ($5-10/week taxable benefit) is often cheaper than rental AND gives employees ownership. Owned garments are better maintained because the employee cares about them.', tags:'EMBROIDERY · OWNERSHIP · ALLOWANCE'},

function buildSidebar(){
  var h='';
  DOMAINS.forEach(function(d){
    var cls = 's-domain' + (d.id==='sourcing'?' active':'');
    var tag = d.status==='live'?'<span class="s-live s-live-on">Live</span>':'<span class="s-live s-live-plan">Planned</span>';
    h+='<div class="'+cls+'" onclick="toggleDomain(\''+d.id+'\')" id="sd-'+d.id+'"><span class="s-domain-icon">'+d.icon+'</span>'+d.name+tag+'</div>';
    h+='<div class="s-terms'+(d.id==='sourcing'?' open':'')+'" id="st-'+d.id+'">';
    d.terminals.forEach(function(t){
      h+='<div class="s-term" onclick="loadTerminal(\''+d.id+'\',\''+t.id+'\')" id="sterm-'+t.id+'">'+t.name+'</div>';
    });
    h+='</div>';
  });
  document.getElementById('sidebar').innerHTML=h;
}

function toggleDomain(domId){
  document.querySelectorAll('.s-terms').forEach(function(el){el.classList.remove('open')});
  document.querySelectorAll('.s-domain').forEach(function(el){el.classList.remove('active')});
  var terms=document.getElementById('st-'+domId);
  var dom=document.getElementById('sd-'+domId);
  if(terms)terms.classList.add('open');
  if(dom)dom.classList.add('active');
}

function showTab(id){
  document.querySelectorAll('.tab-content').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  var panel=document.getElementById('tab-'+id);
  if(panel)panel.classList.add('active');
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++){
    if(tabs[i].getAttribute('data-tab')===id){tabs[i].classList.add('active');break;}
  }
}

if(riskGroups.length===0){ah+='<div class="alert alert-grn"><div class="alert-title" style="color:#6FFFB0">✓ No Hidden Concentration</div><div class="alert-text">All selected suppliers map to independent parent companies.</div></div>'}else{riskGroups.forEach(function(g){ah+='<div class="alert alert-red"><div class="alert-title" style="color:#FF8FA0">⚠ CONCENTRATION — '+g.parent.toUpperCase()+'</div><div class="alert-text"><strong>'+g.count+' brands</strong> owned by '+g.parent+' ('+g.ticker+'): <strong>'+g.subs.join(', ')+'</strong>. One balance sheet, one supply chain. A disruption affects all '+g.count+' simultaneously.</div></div>'})}
document.getElementById('map-alerts').innerHTML=ah;
var ach='<div style="font-size:0.5rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:0.4rem">Recommended Actions</div>';
riskGroups.forEach(function(g){ach+='<div class="act"><div class="act-pri pri-urg">REDUCE CONCENTRATION</div><div class="act-text">'+g.count+' suppliers under '+g.parent+' ('+g.subs.join(', ')+"). Qualify at least one independent alternative for the highest-spend category.</div></div>"});
if(reduction>20)ach+='<div class="act"><div class="act-pri pri-act">PORTFOLIO REBALANCING</div><div class="act-text">Actual diversification is '+reduction+'% lower than perceived. Target: no more than 30% of category spend with any single parent company.</div></div>';
ach+='<div class="act"><div class="act-pri pri-mon">QUARTERLY REVIEW</div><div class="act-text">M&A constantly changes ownership. Run this analysis quarterly. Set a calendar reminder for the first Monday of each quarter.</div></div>';
document.getElementById('map-actions').innerHTML=ach;
document.getElementById('mapper-results').style.display='block';btn.classList.remove('loading');btn.disabled=false;document.getElementById('mapper-results').scrollIntoView({behavior:'smooth'})},1800)}
